<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verification Home</title>
  <link rel="stylesheet" href="../assets/ui.css">
</head>
<body>
  <body class="page-shell theme-verify">
  <main class="card card--verify">
    <span class="kicker">Public Portal</span>
    <h1>Verification Home</h1>
    <p class="subtext">Use this page to verify official documents by entering or scanning the QR verification code.</p>
    <div class="actions-grid">
      <a class="btn btn-mint btn-detail" href="/verify/check">
        <span class="button-stack">
          <span class="btn-title">Start Verification</span>
          <span class="btn-note">Enter a code or scan the QR on the document</span>
        </span>
      </a>
      <a class="btn btn-ghost btn-detail" href="/">
        <span class="button-stack">
          <span class="btn-title">Back to Main Homepage</span>
          <span class="btn-note">Return to the system landing page</span>
        </span>
      </a>
    </div>
  </main>
</body>
</html>
