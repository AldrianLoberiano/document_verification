<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login</title>
  <style>
    :root {
      --bg: #f8fbff;
      --text: #12263a;
      --card: #ffffff;
      --primary: #0f766e;
      --line: #d8e2eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top right, #d5f5f2 0%, var(--bg) 55%);
      color: var(--text);
    }
    .card {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 14px 30px rgba(18, 38, 58, 0.09);
    }
    h1 { margin-top: 0; }
    label { display: block; margin-bottom: 10px; font-weight: 600; }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #bed0df;
      border-radius: 8px;
      margin-top: 4px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 11px;
      color: #fff;
      background: var(--primary);
      font-weight: 700;
      cursor: pointer;
    }
    .msg { margin-top: 10px; color: #b91c1c; min-height: 20px; }
    .links { margin-top: 10px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Admin Login</h1>
    <p>Only users with admin role can sign in here.</p>
    <form id="login-form">
      <label>Email
        <input type="email" id="email" value="admin@docverify.local" required>
      </label>
      <label>Password
        <input type="password" id="password" value="Admin@12345" required>
      </label>
      <button type="submit">Sign In as Admin</button>
    </form>
    <p class="msg" id="message"></p>
    <div class="links">
      <a href="/admin">Back to Admin Home</a>
    </div>
  </main>

  <script>
    const tokenKey = 'docverify_admin_token';
    const form = document.getElementById('login-form');
    const message = document.getElementById('message');

    function setToken(token) {
      if (token) {
        localStorage.setItem(tokenKey, token);
      } else {
        localStorage.removeItem(tokenKey);
      }
    }

    async function adminLogin(email, password) {
      const response = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || 'Login failed.');
      }

      return data;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';

      try {
        const data = await adminLogin(
          document.getElementById('email').value,
          document.getElementById('password').value
        );

        if (!data.user || data.user.role !== 'admin') {
          setToken('');
          throw new Error('Admin access only.');
        }

        setToken(data.token);
        window.location.href = '/admin/dashboard';
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
