<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Document Verification System</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --text: #12263a;
      --card: #ffffff;
      --primary: #005f73;
      --secondary: #0a9396;
      --muted: #5c6b7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #d7eff3 0%, var(--bg) 55%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 24px 50px rgba(18, 38, 58, 0.12);
      padding: 28px;
    }
    h1 { margin-top: 0; font-size: 2rem; }
    p { color: var(--muted); line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 18px; }
    a {
      display: block;
      text-decoration: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      font-weight: 700;
    }
    .note { margin-top: 18px; font-size: 0.95rem; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Document Verification System</h1>
    <p>
      Upload and manage official documents with unique QR authentication codes.
      Anyone can verify a document instantly through the public verification portal.
    </p>
    <div class="grid">
      <a href="/admin">Open Admin Dashboard</a>
      <a href="/verify">Open Public Verification</a>
    </div>
    <p class="note">
      For QR scanning links, use the generated format: <strong>/verify/CODE123ABC</strong>
    </p>
  </main>
</body>
</html>
