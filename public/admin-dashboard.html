<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Dashboard - Document Verification</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <style>
    :root {
      --bg: #f1f7ff;
      --text: #112d4e;
      --panel: #ffffff;
      --line: #d6e0ee;
      --primary: #2c5282;
      --danger: #b91c1c;
      --ok: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(145deg, #d9e9ff 0%, var(--bg) 40%);
      color: var(--text);
      padding: 20px;
    }
    .container { max-width: 1120px; margin: 0 auto; display: grid; gap: 14px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      overflow-x: auto;
    }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    h1, h2 { margin: 0 0 10px; }
    .muted { color: #526477; }
    input, textarea {
      width: 100%;
      padding: 9px;
      border: 1px solid #bfd0e0;
      border-radius: 8px;
      margin-top: 4px;
    }
    button {
      background: var(--primary);
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .danger { background: var(--danger); }
    .secondary { background: #4a5568; }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 8px; text-align: left; }
    th { background: #f7fbff; }
    .status-active { color: var(--ok); font-weight: 700; }
    .status-revoked { color: var(--danger); font-weight: 700; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    #qr-container { min-height: 128px; }
  </style>
</head>
<body>
  <div class="container">
    <section class="panel">
      <div class="topbar">
        <div>
          <h1>Admin Dashboard</h1>
          <p class="muted" id="auth-state">Checking session...</p>
        </div>
        <div class="actions">
          <a href="/admin" style="text-decoration:none;"><button type="button" class="secondary">Admin Home</button></a>
          <button id="logout-btn" class="danger" type="button">Logout</button>
        </div>
      </div>
    </section>

    <section class="panel" id="dashboard">
      <h2>Upload New Document</h2>
      <form id="doc-form">
        <div class="row">
          <label>Title<input name="title" required></label>
          <label>Document Type<input name="document_type" required></label>
          <label>Document Number<input name="document_number"></label>
          <label>Recipient Name<input name="recipient_name"></label>
          <label>Issued Date<input type="date" name="issued_at"></label>
          <label>Expires Date<input type="date" name="expires_at"></label>
        </div>
        <label>Notes<textarea name="notes" rows="2"></textarea></label>
        <label>Document File (PDF/JPG/PNG, max 10MB)<input type="file" name="document_file" accept=".pdf,.png,.jpg,.jpeg" required></label>
        <button type="submit">Upload Document</button>
      </form>
    </section>

    <section class="panel" id="documents-panel">
      <h2>Documents</h2>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Type</th>
            <th>Code</th>
            <th>Status</th>
            <th>Verification URL</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="documents-body"></tbody>
      </table>
    </section>

    <section class="panel" id="logs-panel">
      <h2>Verification Logs (Latest 200)</h2>
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Status</th>
            <th>IP Address</th>
            <th>Attempted At</th>
          </tr>
        </thead>
        <tbody id="logs-body"></tbody>
      </table>
    </section>

    <section class="panel" id="qr-panel" hidden>
      <h2>Generated QR Code</h2>
      <p class="muted" id="qr-url-text"></p>
      <div id="qr-container"></div>
    </section>
  </div>

  <script>
    const tokenKey = 'docverify_admin_token';
    const authState = document.getElementById('auth-state');
    const logoutBtn = document.getElementById('logout-btn');
    const docForm = document.getElementById('doc-form');
    const documentsBody = document.getElementById('documents-body');
    const logsBody = document.getElementById('logs-body');
    const qrPanel = document.getElementById('qr-panel');
    const qrContainer = document.getElementById('qr-container');
    const qrUrlText = document.getElementById('qr-url-text');

    function getToken() {
      return localStorage.getItem(tokenKey) || '';
    }

    function clearToken() {
      localStorage.removeItem(tokenKey);
    }

    async function api(url, options = {}) {
      const headers = new Headers(options.headers || {});
      const token = getToken();

      if (token) {
        headers.set('Authorization', `Bearer ${token}`);
      }

      if (!(options.body instanceof FormData) && !headers.has('Content-Type')) {
        headers.set('Content-Type', 'application/json');
      }

      const response = await fetch(url, { ...options, headers });
      const contentType = response.headers.get('content-type') || '';
      const data = contentType.includes('application/json') ? await response.json() : null;

      if (!response.ok) {
        throw new Error(data && data.message ? data.message : `Request failed (${response.status})`);
      }

      return data;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderDocuments(items) {
      documentsBody.innerHTML = '';
      items.forEach((doc) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(doc.title)}</td>
          <td>${escapeHtml(doc.document_type)}</td>
          <td>${escapeHtml(doc.verification_code)}</td>
          <td class="status-${escapeHtml(doc.status)}">${escapeHtml(doc.status)}</td>
          <td><a href="${escapeHtml(doc.verification_url)}" target="_blank">${escapeHtml(doc.verification_url)}</a></td>
          <td>
            <div class="actions">
              <button data-action="qr">Show QR</button>
              <button data-action="download">Download</button>
              <button data-action="revoke" class="secondary">Revoke</button>
              <button data-action="delete" class="danger">Delete</button>
            </div>
          </td>
        `;
        tr.dataset.doc = JSON.stringify(doc);
        documentsBody.appendChild(tr);
      });
    }

    function renderLogs(items) {
      logsBody.innerHTML = '';
      items.forEach((log) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(log.verification_code)}</td>
          <td>${escapeHtml(log.status)}</td>
          <td>${escapeHtml(log.ip_address || '-')}</td>
          <td>${escapeHtml(log.attempted_at || '-')}</td>
        `;
        logsBody.appendChild(tr);
      });
    }

    function showQr(url) {
      qrPanel.hidden = false;
      qrUrlText.textContent = url;
      qrContainer.innerHTML = '';
      new QRCode(qrContainer, {
        text: url,
        width: 180,
        height: 180,
      });
    }

    async function refreshDashboard() {
      const [docs, logs] = await Promise.all([
        api('/api/admin/documents'),
        api('/api/admin/logs'),
      ]);
      renderDocuments(docs);
      renderLogs(logs);
    }

    async function enforceAdminSession() {
      const token = getToken();
      if (!token) {
        window.location.replace('/admin/login');
        return;
      }

      try {
        const me = await api('/api/me');
        if (!me || me.role !== 'admin') {
          clearToken();
          window.location.replace('/admin/login');
          return;
        }

        authState.textContent = `Logged in as ${me.name} (${me.role})`;
        await refreshDashboard();
      } catch (error) {
        clearToken();
        window.location.replace('/admin/login');
      }
    }

    logoutBtn.addEventListener('click', async () => {
      try {
        await api('/api/logout', { method: 'POST' });
      } catch (error) {
      }

      clearToken();
      window.location.replace('/admin/login');
    });

    docForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(docForm);

      try {
        await api('/api/admin/documents', {
          method: 'POST',
          body: formData,
        });
        docForm.reset();
        await refreshDashboard();
      } catch (error) {
        alert(error.message);
      }
    });

    documentsBody.addEventListener('click', async (event) => {
      const button = event.target.closest('button');
      if (!button) {
        return;
      }

      const row = button.closest('tr');
      const doc = JSON.parse(row.dataset.doc || '{}');
      const action = button.dataset.action;

      try {
        if (action === 'qr') {
          showQr(doc.verification_url);
        }

        if (action === 'download') {
          window.open(`/api/admin/documents/${doc.id}/download`, '_blank');
        }

        if (action === 'revoke') {
          await api(`/api/admin/documents/${doc.id}/revoke`, { method: 'POST' });
          await refreshDashboard();
        }

        if (action === 'delete') {
          if (!confirm('Delete this document permanently?')) {
            return;
          }
          await api(`/api/admin/documents/${doc.id}`, { method: 'DELETE' });
          await refreshDashboard();
        }
      } catch (error) {
        alert(error.message);
      }
    });

    enforceAdminSession();
  </script>
</body>
</html>
