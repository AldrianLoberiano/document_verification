<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verification Home</title>
  <style>
    :root {
      --bg: #f4fbf7;
      --card: #ffffff;
      --text: #173b2b;
      --primary: #15803d;
      --secondary: #374151;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #dcfce7 0%, var(--bg) 50%);
      color: var(--text);
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 16px 34px rgba(5, 46, 22, 0.12);
    }
    h1 { margin-top: 0; }
    p { line-height: 1.6; }
    .actions {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    a {
      text-decoration: none;
      text-align: center;
      color: #fff;
      font-weight: 700;
      padding: 12px;
      border-radius: 9px;
      background: var(--primary);
    }
    a.alt { background: var(--secondary); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Verification Home</h1>
    <p>Use this page to verify official documents by entering or scanning the QR verification code.</p>
    <div class="actions">
      <a href="/verify/check">Verify a Document</a>
      <a class="alt" href="/">Back to Main Homepage</a>
    </div>
  </main>
</body>
</html>
