<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login</title>
  <link rel="stylesheet" href="../assets/ui.css">
</head>
<body class="page-shell theme-admin">
  <main class="card card--narrow">
    <span class="kicker">Restricted Access</span>
    <h1>Admin Login</h1>
    <p class="subtext">Only users with an <strong>admin</strong> role can sign in here.</p>
    <form id="login-form">
      <div class="input-group">
        <label>Email
          <input type="email" id="email" value="admin@docverify.local" required>
        </label>
      </div>
      <div class="input-group">
        <label>Password
          <input type="password" id="password" value="Admin@12345" required>
        </label>
      </div>
      <button class="primary" type="submit" style="width:100%;">Sign In as Admin</button>
    </form>
    <p class="msg-error" id="message"></p>
    <div class="actions-grid" style="margin-top:12px;">
      <a class="btn btn-ghost" href="../admin">Back to Admin Home</a>
    </div>
  </main>

  <script>
    const tokenKey = 'docverify_admin_token';
    const form = document.getElementById('login-form');
    const message = document.getElementById('message');

    function setToken(token) {
      if (token) {
        localStorage.setItem(tokenKey, token);
      } else {
        localStorage.removeItem(tokenKey);
      }
    }

    async function adminLogin(email, password) {
      const response = await fetch('../../api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || 'Login failed.');
      }

      return data;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';

      try {
        const data = await adminLogin(
          document.getElementById('email').value,
          document.getElementById('password').value
        );

        if (!data.user || data.user.role !== 'admin') {
          setToken('');
          throw new Error('Admin access only.');
        }

        setToken(data.token);
        window.location.href = 'dashboard';
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
