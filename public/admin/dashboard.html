<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Dashboard - Document Verification</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <link rel="stylesheet" href="../assets/ui.css">
  <style>
    .status-active { color: var(--ok-600); font-weight: 700; }
    .status-revoked { color: var(--danger-600); font-weight: 700; }
    .table-link {
      display: inline-block;
      max-width: 280px;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      color: var(--brand-700);
      text-decoration: none;
    }
    #qr-container { min-height: 128px; }
  </style>
</head>
<body class="page-shell theme-admin" style="display:block;">
  <div class="layout-stack">
    <section class="panel">
      <div class="topbar">
        <div>
          <span class="kicker">Admin Console</span>
          <h1>Admin Dashboard</h1>
          <p class="subtext" id="auth-state">Checking session...</p>
        </div>
        <div class="inline-actions">
          <a class="btn btn-ghost" href="./index.html">Admin Home</a>
          <button id="logout-btn" class="danger" type="button">Logout</button>
        </div>
      </div>
    </section>

    <section class="panel" id="dashboard">
      <h2>Upload New Document</h2>
      <form id="doc-form">
        <div class="row-grid">
          <label>Title<input name="title" required></label>
          <label>Document Type<input name="document_type" required></label>
          <label>Document Number<input name="document_number"></label>
          <label>Recipient Name<input name="recipient_name"></label>
          <label>Issued Date<input type="date" name="issued_at"></label>
          <label>Expires Date<input type="date" name="expires_at"></label>
        </div>
        <label>Notes<textarea name="notes" rows="2"></textarea></label>
        <label>Document File (PDF/JPG/PNG, max 10MB)<input type="file" name="document_file" accept=".pdf,.png,.jpg,.jpeg" required></label>
        <button class="primary" type="submit">Upload Document</button>
      </form>
    </section>

    <section class="panel" id="documents-panel">
      <h2>Documents</h2>
      <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Type</th>
            <th>Code</th>
            <th>Status</th>
            <th>Verification URL</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="documents-body"></tbody>
      </table>
      </div>
    </section>

    <section class="panel" id="logs-panel">
      <h2>Verification Logs (Latest 200)</h2>
      <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Status</th>
            <th>IP Address</th>
            <th>Attempted At</th>
          </tr>
        </thead>
        <tbody id="logs-body"></tbody>
      </table>
      </div>
    </section>

    <section class="panel" id="qr-panel" hidden>
      <h2>Generated QR Code</h2>
      <p class="muted" id="qr-url-text"></p>
      <div id="qr-container"></div>
      <div class="inline-actions" style="margin-top:10px;">
        <button id="download-qr-btn" type="button" class="secondary">Download QR</button>
      </div>
    </section>
  </div>

  <script>
    const tokenKey = 'docverify_admin_token';
    const authState = document.getElementById('auth-state');
    const logoutBtn = document.getElementById('logout-btn');
    const docForm = document.getElementById('doc-form');
    const documentsBody = document.getElementById('documents-body');
    const logsBody = document.getElementById('logs-body');
    const qrPanel = document.getElementById('qr-panel');
    const qrContainer = document.getElementById('qr-container');
    const qrUrlText = document.getElementById('qr-url-text');
    const downloadQrBtn = document.getElementById('download-qr-btn');

    function getToken() {
      return localStorage.getItem(tokenKey) || '';
    }

    function clearToken() {
      localStorage.removeItem(tokenKey);
    }

    async function api(url, options = {}) {
      const headers = new Headers(options.headers || {});
      const token = getToken();

      if (token) {
        headers.set('Authorization', `Bearer ${token}`);
      }

      if (!(options.body instanceof FormData) && !headers.has('Content-Type')) {
        headers.set('Content-Type', 'application/json');
      }

      const response = await fetch(url, { ...options, headers });
      const contentType = response.headers.get('content-type') || '';
      const data = contentType.includes('application/json') ? await response.json() : null;

      if (!response.ok) {
        throw new Error(data && data.message ? data.message : `Request failed (${response.status})`);
      }

      return data;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderDocuments(items) {
      documentsBody.innerHTML = '';
      items.forEach((doc) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(doc.title)}</td>
          <td>${escapeHtml(doc.document_type)}</td>
          <td>${escapeHtml(doc.verification_code)}</td>
          <td class="status-${escapeHtml(doc.status)}">${escapeHtml(doc.status)}</td>
          <td><a class="table-link" href="${escapeHtml(doc.verification_url)}" target="_blank">${escapeHtml(doc.verification_url)}</a></td>
          <td>
            <div class="inline-actions">
              <button data-action="qr">Show QR</button>
              <button data-action="download">Download</button>
              <button data-action="revoke" class="secondary">Revoke</button>
              <button data-action="delete" class="danger">Delete</button>
            </div>
          </td>
        `;
        tr.dataset.doc = JSON.stringify(doc);
        documentsBody.appendChild(tr);
      });
    }

    function renderLogs(items) {
      logsBody.innerHTML = '';
      items.forEach((log) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(log.verification_code)}</td>
          <td>${escapeHtml(log.status)}</td>
          <td>${escapeHtml(log.ip_address || '-')}</td>
          <td>${escapeHtml(log.attempted_at || '-')}</td>
        `;
        logsBody.appendChild(tr);
      });
    }

    function showQr(url) {
      qrPanel.hidden = false;
      qrUrlText.textContent = url;
      qrContainer.innerHTML = '';
      new QRCode(qrContainer, {
        text: url,
        width: 180,
        height: 180,
      });
    }

    async function downloadDocument(documentId) {
      const token = getToken();
      if (!token) {
        throw new Error('Your session expired. Please log in again.');
      }

      const response = await fetch(`../api/admin/documents/${documentId}/download`, {
        headers: {
          Authorization: `Bearer ${token}`,
        },
      });

      if (!response.ok) {
        throw new Error(`Unable to download file (${response.status}).`);
      }

      const blob = await response.blob();
      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = objectUrl;

      const contentDisposition = response.headers.get('content-disposition') || '';
      const filenameMatch = contentDisposition.match(/filename\*?=(?:UTF-8''|\")?([^\";\n]+)/i);
      const fallbackName = `document-${documentId}`;
      const fileName = filenameMatch ? decodeURIComponent(filenameMatch[1]).replace(/\"/g, '') : fallbackName;

      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(objectUrl);
    }

    function downloadQrImage() {
      const canvas = qrContainer.querySelector('canvas');
      const image = qrContainer.querySelector('img');
      let dataUrl = '';

      if (canvas) {
        dataUrl = canvas.toDataURL('image/png');
      } else if (image) {
        dataUrl = image.src;
      }

      if (!dataUrl) {
        alert('Generate a QR code first.');
        return;
      }

      const fileSafeCode = (qrUrlText.textContent || 'qr-code')
        .split('/')
        .filter(Boolean)
        .pop()
        .replace(/[^a-z0-9_-]/gi, '_');

      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = `${fileSafeCode || 'qr-code'}.png`;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    async function refreshDashboard() {
      const [docs, logs] = await Promise.all([
        api('../api/admin/documents'),
        api('../api/admin/logs'),
      ]);
      renderDocuments(docs);
      renderLogs(logs);
    }

    async function enforceAdminSession() {
      const token = getToken();
      if (!token) {
        window.location.replace('./login.html');
        return;
      }

      try {
        const me = await api('../api/me');
        if (!me || me.role !== 'admin') {
          clearToken();
          window.location.replace('./login.html');
          return;
        }

        authState.textContent = `Logged in as ${me.name} (${me.role})`;
        await refreshDashboard();
      } catch (error) {
        clearToken();
          window.location.replace('./login.html');
      }
    }

    logoutBtn.addEventListener('click', async () => {
      try {
        await api('../api/logout', { method: 'POST' });
      } catch (error) {
      }

      clearToken();
      window.location.replace('./login.html');
    });

    docForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(docForm);

      try {
        await api('../api/admin/documents', {
          method: 'POST',
          body: formData,
        });
        docForm.reset();
        await refreshDashboard();
      } catch (error) {
        alert(error.message);
      }
    });

    documentsBody.addEventListener('click', async (event) => {
      const button = event.target.closest('button');
      if (!button) {
        return;
      }

      const row = button.closest('tr');
      const doc = JSON.parse(row.dataset.doc || '{}');
      const action = button.dataset.action;

      try {
        if (action === 'qr') {
          showQr(doc.verification_url);
        }

        if (action === 'download') {
          await downloadDocument(doc.id);
        }

        if (action === 'revoke') {
          await api(`../api/admin/documents/${doc.id}/revoke`, { method: 'POST' });
          await refreshDashboard();
        }

        if (action === 'delete') {
          if (!confirm('Delete this document permanently?')) {
            return;
          }
          await api(`../api/admin/documents/${doc.id}`, { method: 'DELETE' });
          await refreshDashboard();
        }
      } catch (error) {
        alert(error.message);
      }
    });

    downloadQrBtn.addEventListener('click', () => {
      downloadQrImage();
    });

    enforceAdminSession();
  </script>
</body>
</html>
