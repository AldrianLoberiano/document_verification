<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Home</title>
  <style>
    :root {
      --bg: #eef5ff;
      --text: #102a43;
      --card: #ffffff;
      --primary: #1d4ed8;
      --secondary: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(160deg, #dbeafe 0%, var(--bg) 55%);
      color: var(--text);
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      padding: 24px;
    }
    h1 { margin-top: 0; }
    p { line-height: 1.6; }
    .actions {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    a {
      text-decoration: none;
      text-align: center;
      color: #fff;
      font-weight: 700;
      padding: 12px;
      border-radius: 9px;
      background: var(--primary);
    }
    a.alt { background: var(--secondary); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Admin Home</h1>
    <p>This area is for authorized admin users only. Sign in first before managing official documents, QR codes, and verification logs.</p>
    <div class="actions">
      <a href="/admin/login">Admin Login</a>
      <a class="alt" href="/">Back to Main Homepage</a>
    </div>
  </main>
</body>
</html>
